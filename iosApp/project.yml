name: GoSteady
options:
  bundleIdPrefix: com.gosteady
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

fileGroups:
  - ../README.md

targets:
  GoSteady:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GoSteady/Sources
        group: Sources
    info:
      path: GoSteady/Info.plist
      properties:
        NSHealthShareUsageDescription: "GoSteady needs access to your health data to track workouts, heart rate, steps, sleep, and provide personalised fitness insights."
        NSHealthUpdateUsageDescription: "GoSteady saves your workouts and fitness data to Apple Health so you can track your progress across apps."
        NSLocationWhenInUseUsageDescription: "GoSteady uses your location to track your running, cycling, and swimming routes in real time."
        NSLocationAlwaysAndWhenInUseUsageDescription: "GoSteady needs background location access to continue tracking your route during workouts when the app is in the background."
        NSCameraUsageDescription: "GoSteady uses the camera for exercise form analysis, body composition photos, and food recognition."
        NSMicrophoneUsageDescription: "GoSteady may use the microphone for audio recording during workout sessions."
        NSPhotoLibraryUsageDescription: "GoSteady needs access to your photo library to select images for food recognition and body analysis."
        NSMotionUsageDescription: "GoSteady uses motion data to improve workout tracking accuracy and detect activity type."
        UIBackgroundModes: [location, audio, fetch]
    entitlements:
      path: GoSteady/GoSteady.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gosteady.app
        PRODUCT_NAME: GoSteady
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: GoSteady/Info.plist
        CODE_SIGN_ENTITLEMENTS: GoSteady/GoSteady.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          ENABLE_TESTABILITY: "YES"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: "wholemodule"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          VALIDATE_PRODUCT: "YES"
    preBuildScripts:
      - name: "Generate Build Info"
        script: |
          echo "Build started at $(date)"
          echo "CONFIGURATION: ${CONFIGURATION}"
        basedOnDependencyAnalysis: false

  GoSteadyWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ../watchOSApp/GoSteadyWatch/Sources
        group: Sources
    info:
      path: ../watchOSApp/GoSteadyWatch/Info.plist
    entitlements:
      path: ../watchOSApp/GoSteadyWatch/GoSteadyWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gosteady.app.watchkitapp
        PRODUCT_NAME: GoSteady Watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ../watchOSApp/GoSteadyWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../watchOSApp/GoSteadyWatch/GoSteadyWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SKIP_INSTALL: "NO"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          ENABLE_TESTABILITY: "YES"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: "wholemodule"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          VALIDATE_PRODUCT: "YES"
  GoSteadyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GoSteady/Tests
        group: Tests
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gosteady.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GoSteady.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GoSteady"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: GoSteady

  GoSteadyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GoSteady/UITests
        group: UITests
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gosteady.app.uitests
        TEST_TARGET_NAME: GoSteady
    dependencies:
      - target: GoSteady

schemes:
  GoSteady:
    build:
      targets:
        GoSteady: all
        GoSteadyWatch: all
        GoSteadyTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: GOSTEADY_ENV
          value: debug
          isEnabled: true
    test:
      config: Debug
      targets:
        - GoSteadyTests
      environmentVariables:
        - variable: GOSTEADY_ENV
          value: testing
          isEnabled: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  GoSteadyWatch:
    build:
      targets:
        GoSteadyWatch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

configFiles:
  Debug: GoSteady/Configs/Debug.xcconfig
  Release: GoSteady/Configs/Release.xcconfig
